version: "3.8"

services:
  backend:
    build: ./backend
    container_name: congroup-backend
    volumes:
      - ./mazda.duckdb:/data/mazda.duckdb:ro
    environment:
      - DUCKDB_PATH=/data/mazda.duckdb
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: congroup-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
